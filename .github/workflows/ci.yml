name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  smoke:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: MCP smoke (production)
        env:
          MEMXUS_API_KEY: ${{ secrets.MEMXUS_API_KEY }}
          MCP_SMOKE_URL: https://mcp.memxus.com/mcp
        run: |
          if [ -z "$MEMXUS_API_KEY" ]; then
            echo "MEMXUS_API_KEY not set — skipping live smoke"
            exit 0
          fi
          npm run test:smoke
